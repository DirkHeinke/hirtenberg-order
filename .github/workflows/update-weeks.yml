name: Update Hirtenberg Weeks

on:
  schedule:
    # Täglich 04:17 UTC (≈ 6:17 deutscher Sommerzeit, vor der Bestellannahme).
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch + parse Hirtenberg-Seite
        run: node scripts/update-weeks.mjs

      - name: Commit weeks.js bei Änderungen
        run: |
          if [[ -n "$(git status --porcelain weeks.js)" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add weeks.js
            git commit -m "chore: update weeks.js"
            git push
          else
            echo "Keine Änderungen an weeks.js."
          fi
